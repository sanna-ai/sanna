sanna_constitution: "1.0"
identity:
  agent_name: cli-inspect-test-agent
  domain: testing
  description: CLI interceptor test fixture with script inspection enabled
provenance:
  authored_by: tester@test.com
  approved_by:
    - approver@test.com
  approval_date: "2026-03-14"
  approval_method: test-approval
  change_history: []
boundaries:
  - id: B001
    description: Test boundary
    category: scope
    severity: info
trust_tiers:
  autonomous:
    - Answer questions
  requires_approval: []
  prohibited: []
halt_conditions: []
invariants:
  - id: INV_NO_FABRICATION
    rule: Do not claim facts absent from provided sources.
    enforcement: warn
authority_boundaries:
  can_execute:
    - echo
    - cat
    - bash
    - sh
    - python3
  cannot_execute:
    - rm -rf
  must_escalate:
    - condition: "deploy"
cli_permissions:
  mode: permissive
  justification_required: false
  inspect_scripts: true
  commands:
    - id: cli-001
      binary: echo
      authority: can_execute
      description: "Echo is allowed"
    - id: cli-002
      binary: cat
      authority: can_execute
      description: "Cat is allowed"
    - id: cli-003
      binary: rm
      authority: cannot_execute
      description: "Remove is blocked"
    - id: cli-004
      binary: docker
      authority: must_escalate
      description: "Docker requires approval"
  invariants: []
